<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Absensi - Sistem Absensi</title>
    <!-- Icon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="app-page karyawan-riwayat">

    <div class="app-layout">
        <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-fingerprint brand-icon"></i>
                <span class="brand-text">Absensi<span>Ku</span></span>
            </div>
            
            <div class="user-profile-summary">
                <div class="avatar-circle" id="karyawan-avatar">K</div>
                <div class="profile-info">
                    <h4 id="user-display-name">Karyawan</h4>
                    <span id="user-display-role">Karyawan</span>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a href="/karyawan/absen" class="menu-item">
                    <i class="fas fa-fingerprint"></i> Absen Masuk/Keluar
                </a>
                <a href="/karyawan/riwayat" class="menu-item active">
                    <i class="fas fa-history"></i> Riwayat Absen
                </a>
                <a href="#" id="btn-logout-desktop" class="menu-item logout-link">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </nav>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Topbar Header -->
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebar-toggle" class="sidebar-toggle-btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Riwayat Absensi</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date-time" id="live-clock">Senin, 22 Juni 2026 | 00:00:00</span>
                </div>
            </header>

            <!-- Main Content Container -->
            <main class="main-content">
                <!-- Filters Section -->
                <section class="filters-card card mb-6">
                    <h3>Filter Periode</h3>
                    <div class="filters-grid mt-4">
                        <div class="form-group mb-0">
                            <label for="filter-bulan">Bulan</label>
                            <select id="filter-bulan" class="form-select">
                                <option value="1">Januari</option>
                                <option value="2">Februari</option>
                                <option value="3">Maret</option>
                                <option value="4">April</option>
                                <option value="5">Mei</option>
                                <option value="6">Juni</option>
                                <option value="7">Juli</option>
                                <option value="8">Agustus</option>
                                <option value="9">September</option>
                                <option value="10">Oktober</option>
                                <option value="11">November</option>
                                <option value="12">Desember</option>
                            </select>
                        </div>
                        <div class="form-group mb-0">
                            <label for="filter-tahun">Tahun</label>
                            <select id="filter-tahun" class="form-select">
                                <!-- Will be populated by JS -->
                            </select>
                        </div>
                        <div class="flex-end">
                            <button class="btn btn-primary btn-block" id="btn-apply-filters">
                                <i class="fas fa-filter"></i> Terapkan
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Riwayat List/Table -->
                <section class="content-section card">
                    <div class="section-header">
                        <h2>Catatan Kehadiran</h2>
                    </div>

                    <!-- Responsive Table Container -->
                    <div class="table-container">
                        <table class="data-table" id="table-history">
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Status</th>
                                    <th>Jam Masuk</th>
                                    <th>Foto Masuk</th>
                                    <th>Jam Keluar</th>
                                    <th>Foto Keluar</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="6" class="text-center py-8 text-light">Memuat riwayat absensi...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>

        <!-- Mobile Bottom Nav -->
        <nav class="mobile-nav">
            <a href="/karyawan/absen" class="mobile-nav-item">
                <i class="fas fa-fingerprint"></i>
                <span>Absen</span>
            </a>
            <a href="/karyawan/riwayat" class="mobile-nav-item active">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </a>
            <a href="#" id="btn-logout-mobile" class="mobile-nav-item logout-link">
                <i class="fas fa-sign-out-alt"></i>
                <span>Keluar</span>
            </a>
        </nav>
    </div>

    <!-- Image Viewer Modal (For Attendance Photos) -->
    <div id="photo-modal" class="modal">
        <span class="close-modal" id="close-photo-modal">&times;</span>
        <div class="modal-content-img">
            <img id="modal-img-element" src="" alt="Detail Foto Absen">
            <div id="modal-img-caption" class="caption">Detail Absensi</div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/assets/js/app.js"></script>
</body>
</html>
