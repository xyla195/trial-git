<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Sistem Absensi</title>
    <!-- Icon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Reset Password</h1>
            <p>Masukkan password baru Anda di bawah ini</p>
        </div>

        <!-- Success Message -->
        <div id="success-msg" class="success-message" style="display: none; background: #ECFDF5; color: #047857; border: 1px solid #A7F3D0; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; margin-bottom: 16px;">
            Password berhasil diperbarui! Mengalihkan ke halaman login...
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="error-message"></div>

        <!-- Reset Form -->
        <form id="reset-password-form">
            <div class="form-group">
                <label for="input-new-password">Password Baru</label>
                <input type="password" id="input-new-password" placeholder="Masukkan password baru" required>
            </div>
            <div class="form-group">
                <label for="input-confirm-password">Konfirmasi Password Baru</label>
                <input type="password" id="input-confirm-password" placeholder="Ulangi password baru" required>
            </div>
            
            <button type="submit" id="btn-reset-password" class="btn btn-primary">
                <i class="fas fa-save"></i> Simpan Password Baru
            </button>
        </form>

        <div class="login-footer">
            <a href="/">Kembali ke Halaman Login</a>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/assets/js/app.js"></script>
</body>
</html>
